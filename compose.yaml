services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: obsync
      POSTGRES_USER: obsync
      POSTGRES_PASSWORD: obsync
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obsync -d obsync"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - obsync-postgres:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - obsync-minio:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/obsync &&
        mc anonymous set none local/obsync

volumes:
  obsync-postgres:
  obsync-minio:
