  '@prisma/client': 7.8.0
  '@prisma/adapter-pg': 7.8.0
  pg: 8.16.3
  prisma: 7.8.0
  '@types/pg': 8.16.0
  '@nestjs/jwt': 11.0.2
  argon2: 0.45.0
  '@aws-sdk/client-s3': 3.1090.0
  '@aws-sdk/s3-request-presigner': 3.1090.0
  obsidian: ^1.13.1
  y-indexeddb: ^9.0.12
  y-codemirror.next: ^0.3.5
  '@codemirror/state': 6.5.0
  '@codemirror/view': 6.38.6
