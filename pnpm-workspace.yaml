  fast-uri: "^3.1.4"
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  '@prisma/engines': true
  argon2: true
  prisma: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - argon2@0.45.0
