name: Docker Images

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docker.yml"
      - "Dockerfile.api"
      - "Dockerfile.web"
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: Dockerfile.api
            architecture: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: api
            dockerfile: Dockerfile.api
            architecture: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: web
            dockerfile: Dockerfile.web
            architecture: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: web
            dockerfile: Dockerfile.web
            architecture: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}-${{ matrix.image }}:${{ github.sha }}-${{ matrix.architecture }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.architecture }}
          cache-to: type=gha,scope=${{ matrix.image }}-${{ matrix.architecture }},mode=max

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [api, web]

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-architecture manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}-${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:sha-${GITHUB_SHA::7}" \
            "$IMAGE:${GITHUB_SHA}-amd64" \
            "$IMAGE:${GITHUB_SHA}-arm64"
