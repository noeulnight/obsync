name: Build API Image

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docker-api.yml"
      - "Dockerfile.api"
      - "apps/api/**"
      - "packages/**"
      - "docker/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - architecture: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - architecture: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          platforms: ${{ matrix.platform }}
          tags: ghcr.io/${{ github.repository }}-api:${{ github.sha }}-${{ matrix.architecture }}
          cache-from: type=gha,scope=api-${{ matrix.architecture }}
          cache-to: type=gha,scope=api-${{ matrix.architecture }},mode=max

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-architecture manifest
        env:
          IMAGE: ghcr.io/${{ github.repository }}-api
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:latest" \
            --tag "$IMAGE:sha-${GITHUB_SHA::7}" \
            "$IMAGE:${GITHUB_SHA}-amd64" \
            "$IMAGE:${GITHUB_SHA}-arm64"
